title: Hermes Learning Hub
description: Documentation and guides for setting up AI agents, VPS security, and hands-on tech learning.
baseurl: "/Hermes_learning"
url: ""

# Theme
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme

# Just the Docs settings
search_enabled: true
color_scheme: dark
heading_anchors: true
nav_sort: case_insensitive
back_to_top: true
back_to_top_text: "Back to top"

# Markdown settings
markdown: kramdown

# Exclude files from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - LICENSE